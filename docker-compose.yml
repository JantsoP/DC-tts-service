version: '3.8'

services:
  tts-service:
    build: .
    container_name: tts-service
    ports:
      - "3000:3000"
    environment:
      - BIND_ADDR=0.0.0.0:3000
      - LOG_LEVEL=INFO
      - AUTH_KEY=${AUTH_KEY:-}
      - DEEPL_API_TIER=${DEEPL_API_TIER}
      - DEEPL_KEY=${DEEPL_KEY}
      # Optional: For gTTS mode
      - IPV6_BLOCK=${IPV6_BLOCK:-}
      # Optional: For gCloud mode
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      # Optional: For AWS Polly mode
      - AWS_REGION=${AWS_REGION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/modes"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
